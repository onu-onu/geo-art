<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Geo Art - Location-based Visual Art</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="map"></div>
  
  <div id="address-display"></div>
  
  <div id="info-panel">
    <div id="location-info">
      <h2>📍 Location</h2>
      <p id="address">Loading...</p>
      <p id="coordinates"></p>
    </div>
    
    <div id="weather-info">
      <h2>🌤️ Weather</h2>
      <p id="temperature">Loading...</p>
      <p id="wind-speed"></p>
      <p id="weather-description"></p>
    </div>
    
    <div id="facilities-info">
      <h2>🏪 Nearby Facilities</h2>
      <div id="facilities-list"></div>
    </div>
    
    <div id="error-message" style="display: none;"></div>
  </div>
  
  <button id="refresh-btn" onclick="refreshData()">🔄 Refresh</button>
  <button id="toggle-panel-btn" onclick="togglePanel()">📋 Toggle Panel</button>
  
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="script.js"></script>
</body>
</html>
